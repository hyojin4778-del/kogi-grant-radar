# 매일 1회 K-Startup 공고를 새로 가져와 data/grants.json을 갱신하고,
# 바뀐 내용이 있으면 저장소에 커밋합니다. Render는 GitHub 저장소에 새 커밋이
# 생기면 자동으로 재배포하도록 기본 설정되어 있으므로, 이 워크플로우가 실제로
# "매일 자동 업데이트"를 완성하는 부분입니다 (render.yaml의 cron job은 자체
# 파일시스템이 web service와 분리되어 있어 그것만으로는 화면에 반영되지 않음 —
# render.yaml 상단 주석 참고).
name: Update grants

on:
  schedule:
    # UTC 00:00 = 한국시간(KST) 오전 9시
    - cron: "0 0 * * *"
  workflow_dispatch: {} # Actions 탭에서 수동으로도 실행 가능

permissions:
  contents: write

jobs:
  update-grants:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run update-grants

      - name: Commit updated snapshot if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/grants.json
          git diff --cached --quiet && echo "No changes, skipping commit" || git commit -m "chore: daily grant update"
          git push
