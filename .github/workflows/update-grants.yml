# 매일 1회 K-Startup·기업마당·NIPA·KOCCA·SMTECH의 "모집중" 원시 목록만 수집해
# reports/raw/<날짜>/에 커밋합니다. 분류(A/B/C)나 상세검증은 여기서 하지 않습니다 —
# 그건 ir-search 워크플로처럼 사람/Claude의 판단이 필요한 단계라 무인 실행할 수
# 없습니다 (자세한 내용은 프로젝트 루트 CLAUDE.md 참고). 실제 대시보드에 뜨는
# data/latest.json은 Claude Code에서 "지원사업 재조사해줘"라고 요청했을 때만 갱신됩니다.
name: Collect raw grant listings

on:
  schedule:
    # UTC 00:00 = 한국시간(KST) 오전 9시
    - cron: "0 0 * * *"
  workflow_dispatch: {} # Actions 탭에서 수동으로도 실행 가능

permissions:
  contents: write

jobs:
  collect-raw:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install collector dependencies
        run: pip install -r requirements.txt

      - name: Compute today's KST date
        id: date
        run: echo "value=$(TZ='Asia/Seoul' date +%F)" >> "$GITHUB_OUTPUT"

      - name: Collect K-Startup
        run: |
          mkdir -p "reports/raw/${{ steps.date.outputs.value }}"
          python3 collector/kstartup_crawl.py list -o "reports/raw/${{ steps.date.outputs.value }}/kstartup_all.jsonl"

      # if: always() so a K-Startup failure (or vice versa) doesn't stop this independent
      # source from being attempted — each collector already saves whatever it gathered
      # before failing, instead of losing everything on one network hiccup.
      - name: Collect 기업마당/NIPA/KOCCA/SMTECH
        if: always() && !cancelled()
        run: |
          python3 collector/sources_crawl.py list all -o "reports/raw/${{ steps.date.outputs.value }}/sources_all.jsonl" --max-pages 20

      # Runs even if a collection step above failed, so partial results (e.g. K-Startup
      # succeeded but 기업마당 timed out) still get committed instead of silently lost.
      - name: Commit raw snapshot if changed
        if: always() && !cancelled()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "reports/raw/${{ steps.date.outputs.value }}"
          git diff --cached --quiet && echo "No changes, skipping commit" || git commit -m "chore: raw grant collection ${{ steps.date.outputs.value }}"
          git push
