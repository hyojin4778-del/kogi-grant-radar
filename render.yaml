# Render.com Blueprint — https://render.com/docs/blueprint-spec
# GitHub 저장소를 Render에 연결하면 이 파일을 자동으로 인식해서
# 아래 설정대로 Web Service + Cron Job을 만들어줍니다 (수동 설정도 동일하게 가능).
#
# 중요 — 대시보드에 실제로 뜨는 데이터는 이 파일만으로는 갱신되지 않습니다:
# data/latest.json(A/B/C 분류 + 상세검증 결과)은 Claude Code 세션에서
# "지원사업 재조사해줘"라고 요청할 때만 생성됩니다 (프로젝트 루트 CLAUDE.md 참고).
# 아래 cron job은 원시 목록 수집만 담당하며, 그마저도 Render 무료 플랜에서는
# web service와 파일시스템을 공유하지 않아 실행 결과가 화면에 자동 반영되진
# 않습니다 — 실제 "매일 자동 수집·기록"은 .github/workflows/update-grants.yml이
# 담당합니다 (레포에 직접 커밋). 이 cron job은 요청하신 대로 동일 구조를
# 유지하기 위해 남겨두었지만, 유료 Persistent Disk를 공유 설정하지 않는 한
# 중복/보조 용도로만 취급하세요.
services:
  - type: web
    name: kogi-grant-radar
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20

  - type: cron
    name: kogi-grant-radar-daily-collect
    env: python
    plan: free
    # "0 0 * * *"는 UTC 자정 = 한국시간(KST, UTC+9) 오전 9시.
    schedule: "0 0 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: >-
      DATE=$(TZ='Asia/Seoul' date +%F) &&
      mkdir -p reports/raw/$DATE &&
      python3 collector/kstartup_crawl.py list -o reports/raw/$DATE/kstartup_all.jsonl &&
      python3 collector/sources_crawl.py list all -o reports/raw/$DATE/sources_all.jsonl --max-pages 20
